<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muhammad Irsyadul Fikri | Portfolio</title>
  <link rel="preload" as="image" href="/images/profile-dasi.png" />
  <link rel="preload" as="image" href="/images/profile-dasi-fullcolor.png" />
    <script>
      // Set initial theme early to avoid FOUC
      (function() {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored ? stored === 'dark' : prefersDark;
          var root = document.documentElement;
          // Support both class and data-* selectors used by different setups
          root.classList.toggle('dark', isDark);
          root.setAttribute('data-theme', isDark ? 'dark' : 'light');
          root.setAttribute('data-mode', isDark ? 'dark' : 'light');
          // Keep browser UI in sync
          root.style.colorScheme = isDark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
